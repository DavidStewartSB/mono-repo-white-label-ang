<!-- libs/core/shell/src/lib/layout/shell-header/shell-header.component.html -->
<header class="c-header" role="banner">
  <div class="c-header__container">
    <a
      class="c-header__brand"
      href=""
      (click)="onBrandClick($event)"
      aria-label="Ir para o início"
    >
      <img class="c-header__logo" [src]="cfg.brandLogoUrl" [alt]="cfg.appName" />
      <span class="c-header__name">{{ cfg.appName }}</span>
    </a>

    <nav class="c-header__nav" aria-label="Navegação principal">
      <a class="c-header__link" routerLink="/produtos/public/list">Produtos</a>
    </nav>
  </div>
</header>
