<section class="admin-toolbar" id="tour-toolbar">
  <div class="admin-toolbar__left">
    <span class="admin-toolbar__chip" *ngFor="let chip of chips">
      {{ chip.label }}: {{ chip.value }}
    </span>
  </div>

  <div class="admin-toolbar__right">
    <input
      class="admin-toolbar__search"
      type="text"
      placeholder="Pesquisar produto, SKU, categoria..."
    />

    <button
      id="tour-theme-toggle"
      type="button"
      class="admin-toolbar__button admin-toolbar__button--ghost"
      (click)="toggleTheme()"
    >
      Tema
    </button>
  </div>
</section>
